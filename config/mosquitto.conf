# Mosquitto configuration for SmartFactory assignment
# Module 1 — Real-Time Data Analytics for IoT

# ── Listeners ──────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

# WebSocket (optional)
listener 9001
protocol websockets

# ── Authentication ─────────────────────────────────────────────────────────────
# Allow anonymous connections for the assignment (local dev only)
allow_anonymous true

# ── Persistence ────────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ── Session / Queue limits ──────────────────────────────────────────────────────
# Max queued messages per persistent session
max_queued_messages 1000

# Max in-flight QoS 1/2 messages per client
max_inflight_messages 20
